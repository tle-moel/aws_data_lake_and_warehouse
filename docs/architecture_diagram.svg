<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <rect width="900" height="540" fill="#f8f9fc" rx="12"/>

  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">AWS Data Lake &amp; Warehouse — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Amazon Customer Reviews · Electronics · Wireless · Video Games</text>

  <!-- RAW ZONE -->
  <rect x="300" y="80" width="300" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="450" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#222">S3 — Raw Zone</text>
  <text x="450" y="120" text-anchor="middle" font-size="10" fill="#666">TSV files</text>
  <text x="450" y="134" text-anchor="middle" font-size="10" fill="#666">6.6 GB · untouched source data</text>

  <!-- Arrow: raw -> catalog -->
  <line x1="340" y1="140" x2="210" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="218" y="158" width="106" height="18" rx="4" fill="#eef2f7"/>
  <text x="271" y="171" text-anchor="middle" font-size="9.5" fill="#444">Glue Crawler</text>

  <!-- Arrow: raw -> curated -->
  <line x1="450" y1="140" x2="450" y2="180" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="330" y="144" width="240" height="18" rx="4" fill="#eef2f7"/>
  <text x="450" y="157" text-anchor="middle" font-size="9.5" fill="#444">Glue ETL Job · raw_to_curated.py</text>

  <!-- GLUE CATALOG -->
  <rect x="80" y="190" width="200" height="40" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="180" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Glue Data Catalog</text>
  <text x="180" y="223" text-anchor="middle" font-size="10" fill="#666">Schema registry</text>

  <!-- CURATED ZONE -->
  <rect x="300" y="180" width="300" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="450" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#222">S3 — Curated Zone</text>
  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#666">Parquet · cleaned &amp; typed</text>
  <text x="450" y="234" text-anchor="middle" font-size="10" fill="#666">3.4 GB · 13.8M rows · helpful_ratio derived</text>

  <!-- Arrow: curated -> analytics -->
  <line x1="370" y1="240" x2="240" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="222" y="252" width="230" height="18" rx="4" fill="#eef2f7"/>
  <text x="337" y="265" text-anchor="middle" font-size="9.5" fill="#444">Glue ETL Job · curated_to_analytics.py</text>

  <!-- Arrow: curated -> staging -->
  <line x1="530" y1="240" x2="660" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="448" y="252" width="240" height="18" rx="4" fill="#eef2f7"/>
  <text x="568" y="265" text-anchor="middle" font-size="9.5" fill="#444">Glue ETL Job · generate_dimensions.py</text>

  <!-- ANALYTICS ZONE -->
  <rect x="80" y="300" width="280" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="220" y="323" text-anchor="middle" font-size="11" font-weight="700" fill="#222">S3 — Analytics Zone</text>
  <text x="220" y="340" text-anchor="middle" font-size="10" fill="#666">Pre-aggregated Parquet</text>
  <text x="220" y="354" text-anchor="middle" font-size="10" fill="#666">5 aggregation tables</text>

  <!-- STAGING ZONE -->
  <rect x="540" y="300" width="280" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="680" y="323" text-anchor="middle" font-size="11" font-weight="700" fill="#222">S3 — Staging Zone</text>
  <text x="680" y="340" text-anchor="middle" font-size="10" fill="#666">Star schema Parquet</text>
  <text x="680" y="354" text-anchor="middle" font-size="10" fill="#666">fact + 4 dim tables</text>

  <!-- Arrow: analytics -> athena -->
  <line x1="220" y1="360" x2="220" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="150" y="370" width="140" height="18" rx="4" fill="#eef2f7"/>
  <text x="220" y="383" text-anchor="middle" font-size="9.5" fill="#444">Athena SQL</text>

  <!-- Arrow: staging -> redshift -->
  <line x1="680" y1="360" x2="680" y2="410" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="590" y="370" width="180" height="18" rx="4" fill="#eef2f7"/>
  <text x="680" y="383" text-anchor="middle" font-size="9.5" fill="#444">COPY command</text>

  <!-- ATHENA -->
  <rect x="80" y="410" width="280" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="220" y="433" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Amazon Athena</text>
  <text x="220" y="450" text-anchor="middle" font-size="10" fill="#666">Serverless ad-hoc SQL</text>
  <text x="220" y="464" text-anchor="middle" font-size="10" fill="#666">Validation &amp; exploration queries</text>

  <!-- REDSHIFT -->
  <rect x="540" y="410" width="280" height="60" rx="8" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="680" y="433" text-anchor="middle" font-size="11" font-weight="700" fill="#222">Redshift Serverless</text>
  <text x="680" y="450" text-anchor="middle" font-size="10" fill="#666">Star schema · fact_reviews + 4 dims</text>
  <text x="680" y="464" text-anchor="middle" font-size="10" fill="#666">5 benchmark analytics queries</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
